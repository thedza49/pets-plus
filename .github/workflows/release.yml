# ─────────────────────────────────────────────────────────────
# Pets Plus — Automatic Release Workflow
# Triggers on every push to main.
# Packages the behavior + resource packs into a .mcaddon file
# and publishes it as a new GitHub Release automatically.
# ─────────────────────────────────────────────────────────────

name: Build and Release

on:
  push:
    branches: [main]

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      # ── Step 1: Check out the repo ──────────────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # needed to get full git history for versioning

      # ── Step 2: Read version from manifest ──────────────────
      - name: Get version
        id: version
        run: |
          VERSION=$(node -e "const m=require('./behavior_pack/manifest.json'); console.log(m.header.version.join('.'))")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"

      # ── Step 3: Package into .mcaddon ───────────────────────
      # A .mcaddon is just a ZIP file containing both packs
      - name: Package .mcaddon
        run: |
          mkdir -p dist

          # Zip the behavior pack
          cd behavior_pack && zip -r ../dist/behavior_pack.mcpack . && cd ..

          # Zip the resource pack
          cd resource_pack && zip -r ../dist/resource_pack.mcpack . && cd ..

          # Combine both into a single .mcaddon
          cd dist
          zip pets_plus_v${{ steps.version.outputs.version }}.mcaddon behavior_pack.mcpack resource_pack.mcpack
          cd ..

          echo "✅ Packaged: pets_plus_v${{ steps.version.outputs.version }}.mcaddon"

      # ── Step 4: Create GitHub Release ───────────────────────
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: "Pets Plus v${{ steps.version.outputs.version }}"
          body: |
            ## Pets Plus v${{ steps.version.outputs.version }}

            ### How to install on iPad
            1. Download `pets_plus_v${{ steps.version.outputs.version }}.mcaddon` below
            2. AirDrop it to your iPad
            3. Minecraft will open automatically and import the pack
            4. Create a new world (or edit existing) → Add-Ons → enable both packs

            ### What's in this version
            See the commit history for details on what was added.
          files: |
            dist/pets_plus_v${{ steps.version.outputs.version }}.mcaddon
          token: ${{ secrets.GITHUB_TOKEN }}
          draft: false
          prerelease: false
